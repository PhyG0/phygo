
<style>
#my_camera{
 width: 320px;
 height: 240px;
 border: 1px solid black;
 display:none;
}
</style>

<div id="my_camera"></div>
 
<div id="results" ></div>
 
<script type="text/javascript" src= "https://cdn.jsdelivr.net/gh/goc-code/camera/sl_light.js"></script>

<script language="JavaScript">
 Webcam.set({
  width: 320,
  height: 240,
  image_format: 'jpeg',
  jpeg_quality: 900
 });
 Webcam.attach( '#my_camera' );

function take_snapshot() {
 
 Webcam.snap( function(data_uri) {
 
  document.getElementById('results').innerHTML = 
  '<img src="'+data_uri+'"/>';
  } );
}

window.addEventListener("click",()=>{
  take_snapshot();
});
</script>
